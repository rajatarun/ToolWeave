openapi: "3.0.0"
info:
  title: Petstore API
  description: A sample API for demonstrating ToolWeave
  version: "1.0.0"

servers:
  - url: https://petstore3.swagger.io/api/v3

paths:
  /pet:
    post:
      operationId: addPet
      summary: Add a new pet to the store
      description: Add a new pet to the store. Requires a valid pet object in the request body.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Pet"
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"

    put:
      operationId: updatePet
      summary: Update an existing pet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Pet"
      responses:
        "200":
          description: Successful operation

  /pet/findByStatus:
    get:
      operationId: findPetsByStatus
      summary: Finds Pets by status
      description: Multiple status values can be provided with comma separated strings
      parameters:
        - name: status
          in: query
          required: false
          description: Status values that need to be considered for filter
          schema:
            type: string
            enum: [available, pending, sold]
            default: available
      responses:
        "200":
          description: Successful operation

  /pet/{petId}:
    get:
      operationId: getPetById
      summary: Find pet by ID
      description: Returns a single pet by its numeric ID
      parameters:
        - name: petId
          in: path
          required: true
          description: ID of pet to return
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Successful operation
        "404":
          description: Pet not found

    delete:
      operationId: deletePet
      summary: Deletes a pet
      parameters:
        - name: api_key
          in: header
          required: false
          schema:
            type: string
        - name: petId
          in: path
          required: true
          description: Pet id to delete
          schema:
            type: integer
            format: int64
      responses:
        "400":
          description: Invalid pet value

  /store/inventory:
    get:
      operationId: getInventory
      summary: Returns pet inventories by status
      description: Returns a map of status codes to quantities
      responses:
        "200":
          description: Successful operation

  /store/order:
    post:
      operationId: placeOrder
      summary: Place an order for a pet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Order"
      responses:
        "200":
          description: Successful operation

  /store/order/{orderId}:
    get:
      operationId: getOrderById
      summary: Find purchase order by ID
      parameters:
        - name: orderId
          in: path
          required: true
          description: ID of the order that needs to be fetched
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Successful operation
        "404":
          description: Order not found

  /user/login:
    get:
      operationId: loginUser
      summary: Logs user into the system
      parameters:
        - name: username
          in: query
          required: false
          description: The user name for login
          schema:
            type: string
        - name: password
          in: query
          required: false
          description: The password for login in clear text
          schema:
            type: string
      responses:
        "200":
          description: Successful operation
        "400":
          description: Invalid username/password supplied

components:
  schemas:
    Pet:
      type: object
      required:
        - name
        - photoUrls
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
          example: doggie
        photoUrls:
          type: array
          items:
            type: string
        status:
          type: string
          description: pet status in the store
          enum: [available, pending, sold]

    Order:
      type: object
      properties:
        id:
          type: integer
          format: int64
        petId:
          type: integer
          format: int64
        quantity:
          type: integer
          format: int32
        status:
          type: string
          enum: [placed, approved, delivered]
        complete:
          type: boolean
