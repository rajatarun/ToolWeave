name: Deploy ToolWeave

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write   # required for OIDC token issuance
  contents: read

jobs:
  deploy:
    name: SAM Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::239571291755:role/teamweave-github-actions-sam-deployer
          aws-region: us-east-1

      - name: Set up AWS SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ------------------------------------------------------------------
      # Read outputs from the shared infrastructure stack
      # ------------------------------------------------------------------
      - name: Read tarun-teamweave-shared stack outputs
        id: shared
        run: |
          OUTPUTS=$(aws cloudformation describe-stacks \
            --stack-name tarun-teamweave-shared \
            --query "Stacks[0].Outputs" \
            --output json)

          get_output() {
            echo "$OUTPUTS" | jq -r ".[] | select(.OutputKey==\"$1\") | .OutputValue"
          }

          SUBNET_IDS=$(get_output "LambdaSubnetIds")
          OBS_TABLE=$(get_output "ObservatoryMetricsTableName")
          OBS_TABLE_ARN=$(get_output "ObservatoryMetricsTableArn")

          # Validate required outputs
          if [ -z "$SUBNET_IDS" ]; then
            echo "ERROR: LambdaSubnetIds output missing from tarun-teamweave-shared stack."
            echo "Outputs: $OUTPUTS"
            exit 1
          fi

          # Derive VPC ID from the first subnet (VpcId is not exported by the shared stack)
          FIRST_SUBNET=$(echo "$SUBNET_IDS" | cut -d',' -f1)
          VPC_ID=$(aws ec2 describe-subnets \
            --subnet-ids "$FIRST_SUBNET" \
            --query "Subnets[0].VpcId" \
            --output text)

          if [ -z "$VPC_ID" ] || [ "$VPC_ID" = "None" ]; then
            echo "ERROR: Could not determine VPC ID from subnet $FIRST_SUBNET."
            exit 1
          fi

          echo "subnet_ids=$SUBNET_IDS"       >> "$GITHUB_OUTPUT"
          echo "vpc_id=$VPC_ID"               >> "$GITHUB_OUTPUT"
          echo "obs_table=$OBS_TABLE"         >> "$GITHUB_OUTPUT"
          echo "obs_table_arn=$OBS_TABLE_ARN" >> "$GITHUB_OUTPUT"

          echo "Shared stack outputs loaded."
          echo "  SubnetIds: $SUBNET_IDS"
          echo "  VpcId:     $VPC_ID (derived from $FIRST_SUBNET)"
          echo "  ObsTable:  $OBS_TABLE"

      # ------------------------------------------------------------------
      # Build (native — no container needed for pure-Python deps)
      # ------------------------------------------------------------------
      - name: SAM Build
        run: sam build

      # ------------------------------------------------------------------
      # Deploy
      # ------------------------------------------------------------------
      - name: SAM Deploy
        env:
          OBSERVATORY_SECRET_KEY: ${{ secrets.OBSERVATORY_SECRET_KEY }}
        run: |
          # Build parameter-overrides string; only include ObservatorySecretKey
          # when the GitHub secret is actually set (non-empty), otherwise let
          # the template's default value ("change-me-in-production") apply.
          PARAM_OVERRIDES="LambdaSubnetIds=\"${{ steps.shared.outputs.subnet_ids }}\""
          PARAM_OVERRIDES+=" VpcId=\"${{ steps.shared.outputs.vpc_id }}\""
          PARAM_OVERRIDES+=" ObservatoryMetricsTableName=\"${{ steps.shared.outputs.obs_table }}\""
          PARAM_OVERRIDES+=" ObservatoryMetricsTableArn=\"${{ steps.shared.outputs.obs_table_arn }}\""
          if [ -n "$OBSERVATORY_SECRET_KEY" ]; then
            PARAM_OVERRIDES+=" ObservatorySecretKey=\"$OBSERVATORY_SECRET_KEY\""
          fi

          sam deploy \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides "$PARAM_OVERRIDES"

      # ------------------------------------------------------------------
      # Print Function URL for easy reference
      # ------------------------------------------------------------------
      - name: Print ToolWeave Function URL
        run: |
          URL=$(aws cloudformation describe-stacks \
            --stack-name toolweave \
            --query "Stacks[0].Outputs[?OutputKey=='ToolWeaveFunctionUrl'].OutputValue" \
            --output text)
          echo "ToolWeave MCP endpoint: $URL"
