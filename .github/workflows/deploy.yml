name: Deploy ToolWeave

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write   # required for OIDC token issuance
  contents: read

jobs:
  deploy:
    name: SAM Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::239571291755:role/teamweave-github-actions-sam-deployer
          aws-region: us-east-1

      - name: Set up AWS SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ------------------------------------------------------------------
      # Validate (catches CFN/SAM syntax errors before build)
      # ------------------------------------------------------------------
      - name: SAM Validate
        run: sam validate --lint

      # ------------------------------------------------------------------
      # Build (native — no container needed for pure-Python deps)
      # ------------------------------------------------------------------
      - name: SAM Build
        run: sam build

      # ------------------------------------------------------------------
      # Deploy — VPC, subnet, and observatory table values are resolved
      # inside the template via the SharedStackLookup custom resource.
      # Only the observatory secret key needs an external override.
      # ------------------------------------------------------------------
      - name: SAM Deploy
        env:
          OBSERVATORY_SECRET_KEY: ${{ secrets.OBSERVATORY_SECRET_KEY }}
        run: |
          # Only pass ObservatorySecretKey when the GitHub secret is set;
          # all other parameters have defaults baked into the template.
          PARAM_OVERRIDES=""
          if [ -n "$OBSERVATORY_SECRET_KEY" ]; then
            PARAM_OVERRIDES="ObservatorySecretKey=\"$OBSERVATORY_SECRET_KEY\""
          fi

          sam deploy \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            ${PARAM_OVERRIDES:+--parameter-overrides "$PARAM_OVERRIDES"}

      # ------------------------------------------------------------------
      # Print Function URL for easy reference
      # ------------------------------------------------------------------
      - name: Print ToolWeave API endpoint
        run: |
          URL=$(aws cloudformation describe-stacks \
            --stack-name toolweave \
            --query "Stacks[0].Outputs[?OutputKey=='ToolWeaveApiEndpoint'].OutputValue" \
            --output text)
          echo "ToolWeave MCP endpoint: $URL"
